<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Diego &amp; Karoline | Compartilhe suas fotos</title>
  <meta name="description" content="Compartilhe os momentos especiais do casamento de Diego e Karoline.">
  <meta name="theme-color" content="#91A8D0">

  <!-- Open Graph -->
  <meta property="og:title" content="Diego &amp; Karoline | Compartilhe suas fotos">
  <meta property="og:description" content="Compartilhe os momentos especiais do casamento de Diego e Karoline.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/casal.jpg">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Diego &amp; Karoline | Compartilhe suas fotos">
  <meta name="twitter:description" content="Compartilhe os momentos especiais do casamento de Diego e Karoline.">
  <meta name="twitter:image" content="assets/casal.jpg">

  <!-- Favicon SVG -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Elemento floral superior -->
  <div class="floral floral--top" aria-hidden="true">
    <svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg" fill="none">
      <ellipse cx="30" cy="20" rx="18" ry="10" fill="#91A8D0" opacity="0.18" transform="rotate(-20 30 20)"/>
      <ellipse cx="60" cy="35" rx="14" ry="8" fill="#A8BFE0" opacity="0.15" transform="rotate(10 60 35)"/>
      <ellipse cx="15" cy="50" rx="10" ry="6" fill="#B8CCE8" opacity="0.12" transform="rotate(-10 15 50)"/>
      <path d="M40 10 Q50 30 35 45" stroke="#91A8D0" stroke-width="1" opacity="0.2" fill="none"/>
      <path d="M70 5 Q65 25 80 40" stroke="#A8BFE0" stroke-width="0.8" opacity="0.15" fill="none"/>
      <circle cx="50" cy="15" r="4" fill="#91A8D0" opacity="0.12"/>
      <circle cx="80" cy="20" r="3" fill="#B8CCE8" opacity="0.1"/>
      <ellipse cx="100" cy="25" rx="12" ry="7" fill="#91A8D0" opacity="0.1" transform="rotate(15 100 25)"/>
      <path d="M20 30 Q30 15 45 25" stroke="#91A8D0" stroke-width="0.7" opacity="0.15" fill="none"/>
    </svg>
  </div>

  <main class="hero">
    <!-- Foto do casal -->
    <section class="hero__photo" aria-label="Foto do casal">
      <img
        src="assets/casal.jpg"
        alt="Diego e Karoline"
        width="480"
        height="640"
        loading="eager"
        class="hero__img"
      >
      <div class="hero__overlay"></div>
    </section>

    <!-- Conteúdo -->
    <section class="hero__content">
      <h1 class="hero__names">Diego <span class="hero__amp">&amp;</span> Karoline</h1>
      <p class="hero__date">11 de outubro de 2026</p>
      <p class="hero__text">Compartilhe conosco os momentos mais especiais do nosso grande dia.</p>

      <a
        href="https://docs.google.com/forms/d/e/1FAIpQLSfLxn2d0AIegm-d8Q57i-bTC6BLhZWpbrPhtNbkHU24kx6mNg/viewform?usp=sharing&ouid=102979180188337877390"
        target="_blank"
        rel="noopener noreferrer"
        class="hero__btn"
        aria-label="Enviar fotos do casamento (abre em nova aba)"
      >
        <svg class="hero__btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        ENVIAR FOTOS
      </a>

      <p class="hero__note">Será necessário entrar em uma conta Google para enviar as fotos.</p>
    </section>
  </main>

  <footer class="footer">
    <p class="footer__text">Obrigado por fazer parte da nossa história.</p>
  </footer>

  <!-- Elemento floral inferior -->
  <div class="floral floral--bottom" aria-hidden="true">
    <svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg" fill="none">
      <ellipse cx="170" cy="100" rx="18" ry="10" fill="#91A8D0" opacity="0.18" transform="rotate(20 170 100)"/>
      <ellipse cx="140" cy="85" rx="14" ry="8" fill="#A8BFE0" opacity="0.15" transform="rotate(-10 140 85)"/>
      <ellipse cx="185" cy="70" rx="10" ry="6" fill="#B8CCE8" opacity="0.12" transform="rotate(10 185 70)"/>
      <path d="M160 110 Q150 90 165 75" stroke="#91A8D0" stroke-width="1" opacity="0.2" fill="none"/>
      <path d="M130 115 Q135 95 120 80" stroke="#A8BFE0" stroke-width="0.8" opacity="0.15" fill="none"/>
      <circle cx="150" cy="105" r="4" fill="#91A8D0" opacity="0.12"/>
      <circle cx="120" cy="100" r="3" fill="#B8CCE8" opacity="0.1"/>
      <ellipse cx="100" cy="95" rx="12" ry="7" fill="#91A8D0" opacity="0.1" transform="rotate(-15 100 95)"/>
      <path d="M180 90 Q170 105 155 95" stroke="#91A8D0" stroke-width="0.7" opacity="0.15" fill="none"/>
    </svg>
  </div>

  <script src="script.js"></script>
</body>
</html>
