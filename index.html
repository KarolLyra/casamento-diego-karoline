<!DOCTYPE html>

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="page">
    <article class="invitation">

      <!-- ====== HERO: FOTO DO CASAL ====== -->
      <section class="hero" aria-label="Foto do casal">
        <img
          src="assets/casal.jpg"
          alt="Diego e Karoline"
          class="hero__photo"
          width="480"
          height="640"
          loading="eager"
        >

        <!-- Galho botânico superior direito -->
        <svg class="decoration decoration--top-right" aria-hidden="true" viewBox="0 0 105 140" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Haste principal -->
          <path d="M85 5 Q72 35 78 65 Q82 90 70 120" stroke="#C7A15A" stroke-width="1.1" opacity="0.6" fill="none" stroke-linecap="round"/>
          <!-- Folhas douradas (contorno) -->
          <path d="M78 25 Q68 20 72 30" stroke="#C7A15A" stroke-width="0.8" opacity="0.55" fill="none" stroke-linecap="round"/>
          <path d="M80 25 Q90 18 86 28" stroke="#C7A15A" stroke-width="0.8" opacity="0.55" fill="none" stroke-linecap="round"/>
          <path d="M76 42 Q65 38 70 48" stroke="#C7A15A" stroke-width="0.8" opacity="0.5" fill="none" stroke-linecap="round"/>
          <path d="M79 42 Q89 36 85 46" stroke="#C7A15A" stroke-width="0.8" opacity="0.5" fill="none" stroke-linecap="round"/>
          <path d="M80 60 Q70 56 74 66" stroke="#C7A15A" stroke-width="0.7" opacity="0.45" fill="none" stroke-linecap="round"/>
          <path d="M81 60 Q91 55 87 64" stroke="#C7A15A" stroke-width="0.7" opacity="0.45" fill="none" stroke-linecap="round"/>
          <path d="M76 78 Q66 75 71 84" stroke="#C7A15A" stroke-width="0.7" opacity="0.4" fill="none" stroke-linecap="round"/>
          <!-- Folhas azuladas (contorno fino) -->
          <path d="M73 95 Q63 90 68 100" stroke="#91A8D0" stroke-width="0.7" opacity="0.45" fill="none" stroke-linecap="round"/>
          <path d="M75 95 Q85 90 80 100" stroke="#91A8D0" stroke-width="0.7" opacity="0.45" fill="none" stroke-linecap="round"/>
          <path d="M70 110 Q60 107 66 115" stroke="#91A8D0" stroke-width="0.6" opacity="0.35" fill="none" stroke-linecap="round"/>
          <!-- Pontos dourados -->
          <circle cx="78" cy="15" r="1.8" fill="#C7A15A" opacity="0.4"/>
          <circle cx="85" cy="48" r="1.3" fill="#C7A15A" opacity="0.3"/>
          <circle cx="72" cy="85" r="1.5" fill="#C7A15A" opacity="0.25"/>
        </svg>

        <!-- Galho botânico superior esquerdo -->
        <svg class="decoration decoration--top-left" aria-hidden="true" viewBox="0 0 90 130" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Haste principal -->
          <path d="M15 8 Q28 30 22 55 Q18 75 25 105" stroke="#C7A15A" stroke-width="1" opacity="0.55" fill="none" stroke-linecap="round"/>
          <!-- Folhas douradas (contorno) -->
          <path d="M22 25 Q14 20 18 30" stroke="#C7A15A" stroke-width="0.7" opacity="0.5" fill="none" stroke-linecap="round"/>
          <path d="M22 25 Q30 20 27 30" stroke="#C7A15A" stroke-width="0.7" opacity="0.5" fill="none" stroke-linecap="round"/>
          <path d="M21 44 Q13 40 17 50" stroke="#C7A15A" stroke-width="0.7" opacity="0.45" fill="none" stroke-linecap="round"/>
          <path d="M22 44 Q30 39 27 48" stroke="#C7A15A" stroke-width="0.7" opacity="0.45" fill="none" stroke-linecap="round"/>
          <path d="M20 62 Q12 58 16 68" stroke="#C7A15A" stroke-width="0.6" opacity="0.4" fill="none" stroke-linecap="round"/>
          <!-- Detalhe azul -->
          <path d="M23 78 Q30 73 27 82" stroke="#91A8D0" stroke-width="0.6" opacity="0.4" fill="none" stroke-linecap="round"/>
          <path d="M24 92 Q16 88 20 97" stroke="#91A8D0" stroke-width="0.6" opacity="0.35" fill="none" stroke-linecap="round"/>
          <!-- Pontos -->
          <circle cx="20" cy="15" r="1.5" fill="#C7A15A" opacity="0.35"/>
          <circle cx="26" cy="55" r="1.2" fill="#C7A15A" opacity="0.28"/>
        </svg>
      </section>

      <!-- ====== CONTEÚDO ====== -->
      <section class="content">

        <!-- Nomes -->
        <h1 class="names">
          <span class="names__first">Diego</span>
          <span class="names__ampersand">&amp;</span>
          <span class="names__second">Karoline</span>
        </h1>

        <!-- Divisor dourado com coração -->
        <div class="divider" aria-hidden="true">
          <span class="divider__line"></span>
          <svg class="divider__heart" width="16" height="14" viewBox="0 0 16 14" fill="none">
            <path d="M8 13C8 13 1.5 8.5 1.5 4.5C1.5 2.7 3 1.2 4.8 1.2C6.2 1.2 7.3 2 8 3C8.7 2 9.8 1.2 11.2 1.2C13 1.2 14.5 2.7 14.5 4.5C14.5 8.5 8 13 8 13Z" fill="#C9A45F" opacity="0.8"/>
          </svg>
          <span class="divider__line"></span>
        </div>

        <!-- Data -->
        <p class="date">11 DE OUTUBRO DE 2026</p>

        <!-- Ornamento botânico dourado -->
        <div class="botanical" aria-hidden="true">
          <svg width="100" height="24" viewBox="0 0 100 24" fill="none">
            <!-- Folha esquerda -->
            <path d="M50 12 Q38 5 26 12 Q38 19 50 12Z" fill="#C9A45F" opacity="0.4"/>
            <!-- Folha direita -->
            <path d="M50 12 Q62 5 74 12 Q62 19 50 12Z" fill="#C9A45F" opacity="0.4"/>
            <!-- Ramos -->
            <path d="M50 12 Q42 4 32 9" stroke="#C9A45F" stroke-width="0.7" opacity="0.35" fill="none"/>
            <path d="M50 12 Q58 4 68 9" stroke="#C9A45F" stroke-width="0.7" opacity="0.35" fill="none"/>
            <path d="M50 12 Q44 18 35 15" stroke="#C9A45F" stroke-width="0.6" opacity="0.3" fill="none"/>
            <path d="M50 12 Q56 18 65 15" stroke="#C9A45F" stroke-width="0.6" opacity="0.3" fill="none"/>
            <!-- Centro -->
            <circle cx="50" cy="12" r="2" fill="#C9A45F" opacity="0.55"/>
          </svg>
        </div>

        <!-- Mensagem -->
        <p class="message">Compartilhe conosco os momentos mais especiais do nosso grande dia.</p>

        <!-- Botão -->
        <a
          href="https://docs.google.com/forms/d/e/1FAIpQLSfLxn2d0AIegm-d8Q57i-bTC6BLhZWpbrPhtNbkHU24kx6mNg/viewform?usp=sharing&ouid=102979180188337877390"
          target="_blank"
          rel="noopener noreferrer"
          class="photo-button"
          aria-label="Enviar fotos do casamento pelo Google Forms"
        >
          <!-- Ícone câmera dourado -->
          <svg class="photo-button__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <span>Enviar Fotos</span>
        </a>

        <!-- Aviso Google -->
        <p class="notice">
          <svg class="notice__icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <span>Será necessário entrar em uma conta Google para enviar as fotos.</span>
        </p>

      </section>

      <!-- ====== RODAPÉ ====== -->
      <footer class="closing">
        <p class="closing__text">Obrigado por fazer parte<br>da nossa história!</p>

        <!-- Coração dourado -->
        <svg class="closing__heart" width="18" height="16" viewBox="0 0 18 16" fill="none" aria-hidden="true">
          <path d="M9 15C9 15 1 9.5 1 5C1 2.8 2.8 1 5 1C6.8 1 8.1 2.2 9 3.5C9.9 2.2 11.2 1 13 1C15.2 1 17 2.8 17 5C17 9.5 9 15 9 15Z" fill="#C9A45F" opacity="0.7"/>
        </svg>

        <!-- Ornamento final -->
        <svg class="closing__ornament" width="70" height="14" viewBox="0 0 70 14" fill="none" aria-hidden="true">
          <path d="M5 7 Q20 2 35 7 Q50 12 65 7" stroke="#C9A45F" stroke-width="0.9" opacity="0.45" fill="none"/>
          <circle cx="35" cy="7" r="1.8" fill="#C9A45F" opacity="0.5"/>
          <path d="M15 7 Q25 4 35 7" stroke="#C9A45F" stroke-width="0.6" opacity="0.3" fill="none"/>
          <path d="M35 7 Q45 10 55 7" stroke="#C9A45F" stroke-width="0.6" opacity="0.3" fill="none"/>
        </svg>
      </footer>

      <!-- Respingos dourados discretos (bordas apenas) -->
      <svg class="decoration decoration--dust" aria-hidden="true" viewBox="0 0 430 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="320" r="2.2" fill="#C7A15A" opacity="0.2"/>
        <circle cx="408" cy="350" r="1.8" fill="#C7A15A" opacity="0.18"/>
        <circle cx="12" cy="580" r="2" fill="#C7A15A" opacity="0.17"/>
        <circle cx="415" cy="620" r="2.5" fill="#C7A15A" opacity="0.15"/>
        <circle cx="22" cy="780" r="1.5" fill="#C7A15A" opacity="0.2"/>
        <circle cx="405" cy="820" r="2" fill="#C7A15A" opacity="0.16"/>
        <circle cx="15" cy="950" r="2.2" fill="#C7A15A" opacity="0.18"/>
        <circle cx="412" cy="980" r="1.8" fill="#C7A15A" opacity="0.15"/>
        <circle cx="20" cy="1080" r="2" fill="#C7A15A" opacity="0.2"/>
        <circle cx="408" cy="1100" r="1.5" fill="#C7A15A" opacity="0.17"/>
        <circle cx="25" cy="450" r="1.5" fill="#C7A15A" opacity="0.15"/>
        <circle cx="400" cy="480" r="2" fill="#C7A15A" opacity="0.16"/>
