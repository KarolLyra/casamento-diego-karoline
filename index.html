<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Diego &amp; Karoline | Compartilhe suas fotos</title>
  <meta name="description" content="Compartilhe os momentos especiais do casamento de Diego e Karoline.">
  <meta name="theme-color" content="#91A8D0">

  <!-- Open Graph -->
  <meta property="og:title" content="Diego &amp; Karoline | Compartilhe suas fotos">
  <meta property="og:description" content="Compartilhe os momentos especiais do casamento de Diego e Karoline.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/casal.jpg">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Diego &amp; Karoline | Compartilhe suas fotos">
  <meta name="twitter:description" content="Compartilhe os momentos especiais do casamento de Diego e Karoline.">
  <meta name="twitter:image" content="assets/casal.jpg">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Great+Vibes&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Floral superior direito -->
  <div class="floral floral--top-right" aria-hidden="true">
    <svg viewBox="0 0 180 200" xmlns="http://www.w3.org/2000/svg" fill="none">
      <!-- Flores azuis aquarela -->
      <ellipse cx="130" cy="40" rx="22" ry="14" fill="#91A8D0" opacity="0.55" transform="rotate(-25 130 40)"/>
      <ellipse cx="150" cy="60" rx="16" ry="10" fill="#DCE7F4" opacity="0.6" transform="rotate(15 150 60)"/>
      <ellipse cx="110" cy="65" rx="18" ry="11" fill="#91A8D0" opacity="0.4" transform="rotate(-10 110 65)"/>
      <ellipse cx="160" cy="30" rx="12" ry="8" fill="#DCE7F4" opacity="0.5" transform="rotate(20 160 30)"/>
      <ellipse cx="140" cy="80" rx="14" ry="9" fill="#91A8D0" opacity="0.35" transform="rotate(-5 140 80)"/>
      <!-- Folhas douradas -->
      <path d="M120 20 Q135 35 125 55" stroke="#C9A45F" stroke-width="1.2" opacity="0.6" fill="none"/>
      <path d="M155 15 Q145 40 160 55" stroke="#C9A45F" stroke-width="1" opacity="0.5" fill="none"/>
      <path d="M100 45 Q115 55 108 75" stroke="#C9A45F" stroke-width="0.9" opacity="0.45" fill="none"/>
      <!-- Pétalas brancas -->
      <circle cx="125" cy="30" r="5" fill="#FAF8F3" opacity="0.5"/>
      <circle cx="155" cy="45" r="4" fill="#FAF8F3" opacity="0.4"/>
      <circle cx="145" cy="75" r="3.5" fill="#FAF8F3" opacity="0.35"/>
      <!-- Detalhes dourados -->
      <circle cx="135" cy="50" r="2.5" fill="#C9A45F" opacity="0.5"/>
      <circle cx="148" cy="35" r="2" fill="#C9A45F" opacity="0.4"/>
    </svg>
  </div>

  <!-- Floral inferior esquerdo -->
  <div class="floral floral--bottom-left" aria-hidden="true">
    <svg viewBox="0 0 180 200" xmlns="http://www.w3.org/2000/svg" fill="none">
      <!-- Flores azuis -->
      <ellipse cx="50" cy="150" rx="22" ry="14" fill="#91A8D0" opacity="0.5" transform="rotate(20 50 150)"/>
      <ellipse cx="30" cy="130" rx="16" ry="10" fill="#DCE7F4" opacity="0.55" transform="rotate(-15 30 130)"/>
      <ellipse cx="70" cy="135" rx="18" ry="11" fill="#91A8D0" opacity="0.4" transform="rotate(10 70 135)"/>
      <ellipse cx="20" cy="160" rx="12" ry="8" fill="#DCE7F4" opacity="0.45" transform="rotate(-20 20 160)"/>
      <ellipse cx="55" cy="170" rx="14" ry="9" fill="#91A8D0" opacity="0.35" transform="rotate(5 55 170)"/>
      <!-- Folhas douradas -->
      <path d="M60 180 Q45 165 55 145" stroke="#C9A45F" stroke-width="1.2" opacity="0.6" fill="none"/>
      <path d="M25 185 Q35 160 20 145" stroke="#C9A45F" stroke-width="1" opacity="0.5" fill="none"/>
      <path d="M80 155 Q65 145 72 125" stroke="#C9A45F" stroke-width="0.9" opacity="0.45" fill="none"/>
      <!-- Pétalas brancas -->
      <circle cx="40" cy="165" r="5" fill="#FAF8F3" opacity="0.5"/>
      <circle cx="65" cy="145" r="4" fill="#FAF8F3" opacity="0.4"/>
      <circle cx="25" cy="145" r="3.5" fill="#FAF8F3" opacity="0.35"/>
      <!-- Detalhes -->
      <circle cx="50" cy="155" r="2.5" fill="#C9A45F" opacity="0.45"/>
      <circle cx="35" cy="140" r="2" fill="#C9A45F" opacity="0.4"/>
    </svg>
  </div>

  <!-- Folhas douradas inferior direito -->
  <div class="floral floral--bottom-right" aria-hidden="true">
    <svg viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg" fill="none">
      <path d="M80 130 Q95 110 85 90" stroke="#C9A45F" stroke-width="1.5" opacity="0.55" fill="none"/>
      <path d="M90 125 Q105 105 95 85" stroke="#C9A45F" stroke-width="1.2" opacity="0.45" fill="none"/>
      <path d="M100 135 Q110 115 105 95" stroke="#C9A45F" stroke-width="1" opacity="0.4" fill="none"/>
      <ellipse cx="88" cy="100" rx="8" ry="5" fill="#C9A45F" opacity="0.2" transform="rotate(30 88 100)"/>
      <ellipse cx="100" cy="110" rx="6" ry="4" fill="#C9A45F" opacity="0.18" transform="rotate(-20 100 110)"/>
    </svg>
  </div>

  <main class="page">
    <!-- HERO: Foto do casal -->
    <section class="hero" aria-label="Foto do casal">
      <img
        src="assets/casal.jpg"
        alt="Diego e Karoline"
        width="480"
        height="640"
        loading="eager"
        class="hero__img"
      >
      <div class="hero__fade"></div>
    </section>

    <!-- CONTEÚDO -->
    <section class="content">
      <!-- Nomes -->
      <h1 class="names">
        <span class="names__text">Diego</span>
        <span class="names__amp">&amp;</span>
        <span class="names__text">Karoline</span>
      </h1>

      <!-- Divisor decorativo dourado -->
      <div class="divider" aria-hidden="true">
        <span class="divider__line"></span>
        <span class="divider__heart">
          <svg width="16" height="14" viewBox="0 0 16 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 13.5C8 13.5 1 9 1 4.5C1 2.5 2.5 1 4.5 1C6 1 7.3 2 8 3.2C8.7 2 10 1 11.5 1C13.5 1 15 2.5 15 4.5C15 9 8 13.5 8 13.5Z" fill="#C9A45F" opacity="0.85"/>
          </svg>
        </span>
        <span class="divider__line"></span>
      </div>

      <!-- Ornamento de folhas douradas -->
      <div class="ornament" aria-hidden="true">
        <svg width="80" height="20" viewBox="0 0 80 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M40 10 Q30 4 20 10 Q30 16 40 10Z" fill="#C9A45F" opacity="0.5"/>
          <path d="M40 10 Q50 4 60 10 Q50 16 40 10Z" fill="#C9A45F" opacity="0.5"/>
          <path d="M40 10 Q34 2 25 8" stroke="#C9A45F" stroke-width="0.8" opacity="0.4" fill="none"/>
          <path d="M40 10 Q46 2 55 8" stroke="#C9A45F" stroke-width="0.8" opacity="0.4" fill="none"/>
          <circle cx="40" cy="10" r="1.5" fill="#C9A45F" opacity="0.6"/>
        </svg>
      </div>

      <!-- Data -->
      <p class="date">11 de outubro de 2026</p>

      <!-- Mensagem -->
      <p class="message">Compartilhe conosco os momentos mais especiais do nosso grande dia.</p>

      <!-- Botão -->
      <a
        href="https://docs.google.com/forms/d/e/1FAIpQLSfLxn2d0AIegm-d8Q57i-bTC6BLhZWpbrPhtNbkHU24kx6mNg/viewform?usp=sharing&ouid=102979180188337877390"
        target="_blank"
        rel="noopener noreferrer"
        class="btn"
        aria-label="Enviar fotos do casamento (abre em nova aba)"
      >
        <svg class="btn__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <span>ENVIAR FOTOS</span>
      </a>

      <!-- Nota auxiliar -->
      <p class="note">
        <svg class="note__icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Será necessário entrar em uma conta Google para enviar as fotos.
      </p>
    </section>

    <!-- RODAPÉ -->
    <footer class="footer">
      <p class="footer__text">
        Obrigado por fazer parte da nossa história!
        <svg class="footer__heart" width="12" height="11" viewBox="0 0 16 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M8 13.5C8 13.5 1 9 1 4.5C1 2.5 2.5 1 4.5 1C6 1 7.3 2 8 3.2C8.7 2 10 1 11.5 1C13.5 1 15 2.5 15 4.5C15 9 8 13.5 8 13.5Z" fill="#C9A45F" opacity="0.7"/>
        </svg>
      </p>
      <!-- Ornamento final -->
      <div class="footer__ornament" aria-hidden="true">
        <svg width="60" height="12" viewBox="0 0 60 12" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 6 Q15 2 30 6 Q45 10 55 6" stroke="#C9A45F" stroke-width="0.8" opacity="0.5" fill="none"/>
          <circle cx="30" cy="6" r="1.5" fill="#C9A45F" opacity="0.5"/>
        </svg>
      </div>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
